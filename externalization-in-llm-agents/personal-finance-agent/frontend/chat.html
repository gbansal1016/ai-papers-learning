<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinAgent — Chat</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js/dist/amazon-cognito-identity.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Login ── */
    #login-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: white;
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 44px 40px;
      width: 380px;
    }
    .login-card h1 { font-size: 24px; margin-bottom: 6px; color: #111; }
    .login-card p  { color: #666; font-size: 14px; margin-bottom: 28px; }
    label { display: block; font-size: 13px; color: #444; font-weight: 500; margin-bottom: 4px; }
    input {
      width: 100%; padding: 10px 14px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 15px; margin-bottom: 16px; outline: none;
    }
    input:focus { border-color: #4f46e5; }
    .btn-primary {
      width: 100%; padding: 12px; background: #4f46e5; color: white;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
      cursor: pointer;
    }
    .btn-primary:hover { background: #4338ca; }
    #login-error { color: #dc2626; font-size: 13px; margin-top: 12px; text-align: center; }

    /* ── Chat layout ── */
    #chat-screen { flex: 1; display: none; flex-direction: column; height: 100vh; }

    .topbar {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .topbar-logo {
      width: 32px; height: 32px; background: #4f46e5; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 14px;
    }
    .topbar h2 { font-size: 16px; color: #111; }
    .topbar-sub { font-size: 12px; color: #888; }
    #signout-btn {
      background: none; border: 1px solid #ddd; padding: 6px 14px;
      border-radius: 6px; cursor: pointer; font-size: 13px; color: #555;
    }
    #signout-btn:hover { background: #f5f5f5; }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .msg-row { display: flex; gap: 10px; max-width: 820px; width: 100%; }
    .msg-row.user { margin-left: auto; flex-direction: row-reverse; }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600;
    }
    .avatar.agent { background: #ede9fe; color: #4f46e5; }
    .avatar.user  { background: #dbeafe; color: #1d4ed8; }
    .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
      max-width: calc(100% - 44px);
    }
    .bubble.agent {
      background: white;
      border: 1px solid #e5e7eb;
      border-top-left-radius: 4px;
    }
    .bubble.user {
      background: #4f46e5;
      color: white;
      border-top-right-radius: 4px;
    }
    /* Markdown inside agent bubbles */
    .bubble.agent table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
    .bubble.agent th, .bubble.agent td { border: 1px solid #e5e7eb; padding: 6px 10px; text-align: left; }
    .bubble.agent th { background: #f9fafb; font-weight: 600; }
    .bubble.agent h3 { margin: 12px 0 6px; font-size: 14px; }
    .bubble.agent ul, .bubble.agent ol { padding-left: 20px; margin: 6px 0; }
    .bubble.agent li { margin-bottom: 4px; }
    .bubble.agent code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    .bubble.agent p { margin-bottom: 8px; }
    .bubble.agent p:last-child { margin-bottom: 0; }
    .bubble.agent strong { font-weight: 600; }

    .typing {
      display: flex; gap: 4px; align-items: center; padding: 14px 16px;
      background: white; border: 1px solid #e5e7eb; border-radius: 14px;
      border-top-left-radius: 4px; width: fit-content;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%; background: #9ca3af;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* ── Input bar ── */
    .input-bar {
      background: white;
      border-top: 1px solid #e5e7eb;
      padding: 14px 20px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #msg-input {
      flex: 1; border: 1px solid #ddd; border-radius: 10px;
      padding: 10px 14px; font-size: 15px; outline: none; resize: none;
      max-height: 120px; overflow-y: auto; font-family: inherit;
      line-height: 1.5;
    }
    #msg-input:focus { border-color: #4f46e5; }
    #send-btn {
      width: 40px; height: 40px; border-radius: 10px; background: #4f46e5;
      border: none; cursor: pointer; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0;
    }
    #send-btn:hover { background: #4338ca; }
    #send-btn:disabled { background: #c7d2fe; cursor: not-allowed; }
    #send-btn svg { fill: white; }

    .session-tag {
      font-size: 11px; color: #aaa; text-align: center; margin-top: -8px;
    }
  </style>
</head>
<body>

<!-- ── Login ── -->
<div id="login-screen">
  <div class="login-card">
    <h1>FinAgent</h1>
    <p>Your personal AI finance assistant</p>
    <label>Email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="username">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
           onkeydown="if(event.key==='Enter') signIn()">
    <button class="btn-primary" onclick="signIn()">Sign In</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- ── Chat ── -->
<div id="chat-screen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">FA</div>
      <div>
        <div class="topbar h2" style="font-size:16px;font-weight:600;color:#111">FinAgent</div>
        <div class="topbar-sub" id="user-label">Personal Finance AI</div>
      </div>
    </div>
    <button id="signout-btn" onclick="signOut()">Sign out</button>
  </div>

  <div id="messages">
    <!-- Welcome message injected by JS -->
  </div>

  <div class="input-bar">
    <textarea id="msg-input" rows="1" placeholder="Ask about your portfolio, place a trade, check the market…"
              onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
  <div class="session-tag" id="session-tag"></div>
</div>

<script>
// ── Config: replace with your own values after `sam deploy` ──────────────
const COGNITO_USER_POOL_ID = "us-west-2_svS2BZj5s"; // CloudFormation Output: UserPoolId
const COGNITO_CLIENT_ID    = "1smocv4q43cerou23dv9umq06e";
const API_BASE             = "https://n8zmj4xf02.execute-api.us-west-2.amazonaws.com/dev";

// ── Cognito setup ─────────────────────────────────────────────────────────────
const userPool = new AmazonCognitoIdentity.CognitoUserPool({
  UserPoolId: COGNITO_USER_POOL_ID,
  ClientId:   COGNITO_CLIENT_ID,
});
let currentUser    = null;
let currentSession = null;
let sessionId      = null;
let sending        = false;

// ── Auto-restore session on page load ─────────────────────────────────────────
window.addEventListener("load", () => {
  const user = userPool.getCurrentUser();
  if (!user) return;
  user.getSession((err, session) => {
    if (err || !session.isValid()) return;
    currentUser    = user;
    currentSession = session;
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("chat-screen").style.display  = "flex";
    document.getElementById("user-label").textContent = user.getUsername();
    addAgentMessage("👋 Welcome back! What would you like to do today?");
    document.getElementById("msg-input").focus();
  });
});

function signIn() {
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const errEl    = document.getElementById("login-error");
  errEl.textContent = "";

  const cognitoUser   = new AmazonCognitoIdentity.CognitoUser({ Username: email, Pool: userPool });
  const authDetails   = new AmazonCognitoIdentity.AuthenticationDetails({ Username: email, Password: password });

  cognitoUser.authenticateUser(authDetails, {
    onSuccess(result) {
      currentUser    = cognitoUser;
      currentSession = result;
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("chat-screen").style.display  = "flex";
      document.getElementById("user-label").textContent = email;
      addAgentMessage("👋 Hi! I'm FinAgent, your personal finance AI. I can check your **portfolio**, look up **stock quotes**, review your **credit score**, and help you **research trades**.\n\nWhat would you like to do today?");
      document.getElementById("msg-input").focus();
    },
    onFailure(err) {
      errEl.textContent = err.message || "Sign in failed";
    },
  });
}

function signOut() {
  if (currentUser) currentUser.signOut();
  currentUser = currentSession = sessionId = null;
  document.getElementById("chat-screen").style.display  = "none";
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("messages").innerHTML = "";
  document.getElementById("session-tag").textContent = "";
  document.getElementById("email").value = "";
  document.getElementById("password").value = "";
}

function getIdToken() {
  return new Promise((resolve, reject) => {
    currentUser.getSession((err, session) => {
      if (err) return reject(err);
      currentSession = session;
      resolve(session.getIdToken().getJwtToken());
    });
  });
}

// ── Messaging ────────────────────────────────────────────────────────────────
function addUserMessage(text) {
  const row = document.createElement("div");
  row.className = "msg-row user";
  row.innerHTML = `
    <div class="avatar user">Me</div>
    <div class="bubble user">${escapeHtml(text)}</div>`;
  document.getElementById("messages").appendChild(row);
  scrollBottom();
}

function addAgentMessage(markdown) {
  const row = document.createElement("div");
  row.className = "msg-row";
  row.innerHTML = `
    <div class="avatar agent">FA</div>
    <div class="bubble agent">${marked.parse(markdown)}</div>`;
  document.getElementById("messages").appendChild(row);
  scrollBottom();
}

function showTyping() {
  const row = document.createElement("div");
  row.className = "msg-row";
  row.id = "typing-row";
  row.innerHTML = `
    <div class="avatar agent">FA</div>
    <div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  document.getElementById("messages").appendChild(row);
  scrollBottom();
  return row;
}

async function sendMessage() {
  if (sending) return;
  const input = document.getElementById("msg-input");
  const text  = input.value.trim();
  if (!text) return;

  input.value = "";
  autoResize(input);
  addUserMessage(text);
  sending = true;
  document.getElementById("send-btn").disabled = true;

  const typingRow = showTyping();

  try {
    const token = await getIdToken();
    const body  = { message: text };
    if (sessionId) body.session_id = sessionId;

    const res  = await fetch(`${API_BASE}/chat`, {
      method: "POST",
      headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    const data = await res.json();

    typingRow.remove();

    if (!res.ok) throw new Error(data.error || data.message || "Request failed");

    sessionId = data.session_id;
    document.getElementById("session-tag").textContent = `Session: ${sessionId}`;
    addAgentMessage(data.response || "_No response_");
  } catch (err) {
    typingRow.remove();
    addAgentMessage(`⚠️ **Error:** ${err.message}`);
  } finally {
    sending = false;
    document.getElementById("send-btn").disabled = false;
    input.focus();
  }
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

function scrollBottom() {
  const el = document.getElementById("messages");
  el.scrollTop = el.scrollHeight;
}

function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
</script>
</body>
</html>
